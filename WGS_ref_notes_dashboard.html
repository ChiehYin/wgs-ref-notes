<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TB Genomic References Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --bg2: #161b27;
  --bg3: #1e2535;
  --border: #2a3347;
  --border2: #354060;
  --text: #e2e8f0;
  --text2: #8899b4;
  --text3: #4a5e7a;
  --accent: #4d9fff;
  --accent2: #6bc8a0;
  --amber: #f0a050;
  --purple: #a78bfa;
  --rose: #f87171;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}

/* ── HEADER ── */
header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 1.25rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  gap: 1.5rem;
  flex-wrap: wrap;
}
.header-left { display: flex; align-items: center; gap: 1rem; flex-shrink: 0; }
.logo-mark {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-weight: 500; font-size: 14px; color: #fff;
  letter-spacing: -1px; flex-shrink: 0;
}
.header-title { font-size: 17px; font-weight: 600; color: var(--text); letter-spacing: 0.2px; }
.header-sub { font-size: 12px; color: var(--text2); font-family: var(--mono); }
.search-wrap { flex: 1; min-width: 220px; max-width: 420px; position: relative; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 15px; pointer-events: none; }
#search {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px 8px 36px;
  font-size: 14px;
  color: var(--text);
  font-family: var(--sans);
  outline: none;
  transition: border-color .2s;
}
#search::placeholder { color: var(--text3); }
#search:focus { border-color: var(--accent); }

/* ── STATS BAR ── */
.stats-bar {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  background: var(--bg2);
  overflow-x: auto;
}
.stat-item {
  padding: 0.75rem 1.5rem;
  display: flex; align-items: center; gap: 0.5rem;
  border-right: 1px solid var(--border);
  white-space: nowrap;
}
.stat-item:first-child { padding-left: 0; }
.stat-num { font-family: var(--mono); font-size: 22px; font-weight: 500; color: var(--accent); }
.stat-label { font-size: 12px; color: var(--text2); }

/* ── FILTER TABS ── */
.filter-bar {
  padding: 1rem 2rem;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.filter-label { font-size: 12px; color: var(--text3); font-family: var(--mono); margin-right: 4px; }
.tab {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  color: var(--text2);
  background: transparent;
  font-family: var(--sans);
  transition: all .15s;
  letter-spacing: 0.2px;
}
.tab:hover { border-color: var(--border2); color: var(--text); background: var(--bg3); }
.tab.active { color: var(--accent); border-color: var(--accent); background: rgba(77,159,255,.1); }

/* ── TABLE ── */
.table-container { padding: 1.5rem 2rem; overflow-x: auto; }
.count-line { font-size: 12px; color: var(--text3); font-family: var(--mono); margin-bottom: 1rem; }
table { width: 100%; border-collapse: collapse; min-width: 900px; }
thead tr { border-bottom: 1px solid var(--border2); }
th {
  padding: 8px 12px; text-align: left;
  font-size: 11px; font-weight: 600; letter-spacing: 0.8px;
  text-transform: uppercase; color: var(--text3);
  font-family: var(--mono); white-space: nowrap;
}
td { padding: 10px 12px; vertical-align: top; border-bottom: 1px solid var(--border); }
tr:hover td { background: var(--bg2); }
.title-cell { font-weight: 500; font-size: 14px; color: var(--text); line-height: 1.5; max-width: 280px; }
.title-cell .year-tag {
  display: inline-block; margin-top: 4px;
  font-family: var(--mono); font-size: 11px; color: var(--text3);
}
.author-cell { font-size: 12px; color: var(--text2); max-width: 140px; line-height: 1.4; }
.journal-cell { font-size: 12px; color: var(--text2); font-style: italic; max-width: 110px; }
.country-cell { font-size: 12px; color: var(--text2); max-width: 100px; }
.finding-cell { font-size: 13px; color: var(--text); line-height: 1.65; max-width: 480px; }
.finding-cell ul { padding-left: 1rem; margin-top: 2px; }
.finding-cell li { margin-bottom: 4px; color: var(--text2); }
.finding-cell li strong { color: var(--text); }
.finding-cell .no-finding { color: var(--text3); font-style: italic; }

/* BADGE */
.badge {
  display: inline-block; padding: 2px 9px; border-radius: 12px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
  font-family: var(--mono); white-space: nowrap;
}
.b-blue   { background: rgba(77,159,255,.15);  color: var(--accent);  border: 1px solid rgba(77,159,255,.3); }
.b-green  { background: rgba(107,200,160,.15); color: var(--accent2); border: 1px solid rgba(107,200,160,.3); }
.b-amber  { background: rgba(240,160,80,.15);  color: var(--amber);   border: 1px solid rgba(240,160,80,.3); }
.b-purple { background: rgba(167,139,250,.15); color: var(--purple);  border: 1px solid rgba(167,139,250,.3); }
.b-rose   { background: rgba(248,113,113,.15); color: var(--rose);    border: 1px solid rgba(248,113,113,.3); }

/* NEW TAG */
.new-tag {
  display: inline-block;
  margin-left: 6px;
  padding: 1px 6px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  background: var(--rose);
  color: #fff;
  vertical-align: middle;
}

/* TITLE LINK */
.title-cell a { color: var(--text); text-decoration: none; border-bottom: 1px dotted var(--border2); }
.title-cell a:hover { color: var(--accent); border-bottom-color: var(--accent); }

/* EMPTY */
.empty-row td { text-align: center; padding: 3rem; color: var(--text3); font-size: 14px; }

/* FOOTER */
footer {
  text-align: center; padding: 1.5rem 2rem;
  border-top: 1px solid var(--border);
  font-size: 12px; color: var(--text3); font-family: var(--mono);
}

/* ── PAGE NAV ── */
.page-nav {
  display: flex; gap: 6px; align-items: center;
  padding: 0.65rem 2rem;
  background: var(--bg2);
  border-bottom: 2px solid var(--border);
}
.page-btn {
  padding: 6px 20px; border-radius: 6px;
  font-size: 13px; font-weight: 500; cursor: pointer;
  border: 1px solid var(--border); color: var(--text2);
  background: transparent; font-family: var(--sans);
  transition: all .15s; letter-spacing: 0.2px;
}
.page-btn:hover { border-color: var(--border2); color: var(--text); background: var(--bg3); }
.page-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(77,159,255,.12); font-weight: 600; }

/* ── HOST TABLE EXTRA CELLS ── */
.db-cell { font-size: 12px; color: var(--text2); max-width: 130px; line-height: 1.4; }
.gene-cell { font-size: 12px; color: var(--amber); max-width: 130px; line-height: 1.4; font-family: var(--mono); }
</style>
</head>

  {cat:"Transmission cluster",title:"WGS for TB outbreak in London (isoniazid-resistant, 1998–2012)",authors:"Nicola Casali et al.",journal:"PLoS Med",year:"2016",country:"England",url:"https://pubmed.ncbi.nlm.nih.gov/27138087/",finding:`<ul><li>Serial isolates（同肺部位，9–35 月間隔）惰性差異 0–3 SNP；單株菌落最高達 7 SNP（within-host 演化）</li><li>SNP cutoff: <strong>5</strong></li></ul>`},
  {cat:"Transmission cluster",title:"WGS to delineate Mtb outbreaks (UK, 1994–2011) — Walker 2013",authors:"Timothy M Walker et al.",journal:"Lancet Infect Dis",year:"2013",country:"UK",url:"https://pubmed.ncbi.nlm.nih.gov/23158499/",finding:`<ul><li>突變率：<strong>0.5 SNPs/基因組/年</strong>（95%CI 0.3–0.7）</li><li>epi 連結者 3 年內極少超過 5 SNP；10 年內極少超過 10 SNP</li><li>5 SNP 定義近期傳播，epi 連結者可 100% 被捕獲</li></ul>`},
  {cat:"Transmission cluster",title:"WGS for TB outbreaks in Oxfordshire, UK (2007–2012) — Walker 2014",authors:"Timothy M Walker et al.",journal:"Lancet Respir Med",year:"2014",country:"UK",url:"https://pubmed.ncbi.nlm.nih.gov/24841674/",finding:`<ul><li>WGS 以 12 SNP 為標準；epi 調查靈敏度 <strong>42%</strong>、特異度 99%</li><li>群聚內實際 SNP 差異：0–7（中位數 1，IQR 0–2）</li><li>SNP cutoff: <strong>12</strong></li></ul>`},
  {cat:"Transmission cluster",title:"TransCluster: beyond SNP threshold for outbreak cluster identification",authors:"James Strimson et al.",journal:"Mol Biol Evol",year:"2019",country:"Method",finding:`<ul><li>整合突變率、流行病學及基因距離，以推斷傳播（inferred transmissions）取代固定 SNP 門檻</li><li>TransCluster 更準確定義傳播群聚，減少 SNP 門檻的任意性</li></ul>`},
  {cat:"Transmission cluster",title:"Relationship between transmission time and clustering methods in Mtb epidemiology — Meehan 2018",authors:"Conor J. Meehan et al.",journal:"eBioMedicine",year:"2018",country:"DRC (Kinshasa)",url:"https://pubmed.ncbi.nlm.nih.gov/30093240/",finding:`<ul><li>324 株（剛果高發地區），比較 Spoligotyping、MIRU-VNTR、WGS-SNP、cgMLST</li><li>低 SNP 門檻（5）捕捉近期傳播；高門檻（12+）延伸至更久遠傳播</li><li>5 SNP 群聚代表的傳播時間跨度最長可達 <strong>10 年</strong></li></ul>`},

  {cat:"Molecular clock",title:"Global expansion of Mtb Lineage 4 shaped by colonial migration (Brynildsrud 2018)",authors:"Brynildsrud et al.",journal:"",year:"2018",country:"",finding:`<ul><li>L4 突變率：<strong>~0.21 SNPs/基因組/年</strong></li><li>使用 sampling date 校準 Bayesian 演化分析</li></ul>`},
  {cat:"Molecular clock",title:"Multiple introductions of Mtb Lineage 2-Beijing into Africa (Rutaihwa 2019)",authors:"Rutaihwa et al.",journal:"",year:"2019",country:"",finding:`<ul><li>L2 突變率：<strong>~0.59 SNPs/基因組/年</strong>（1.34×10⁻⁷ 替換/位點/年，95%HPD: 9.3×10⁻⁸–1.77×10⁻⁷）</li><li>使用 UCLD clock model（BEAST）</li></ul>`},
  {cat:"Molecular clock",title:"TB genomic epidemiology in eastern Malaysia (Lineage 1, Bainomugisa 2021)",authors:"Arnold Bainomugisa et al.",journal:"Microbial Genomics",year:"2021",country:"Malaysia",finding:`<ul><li>L1 突變率：<strong>0.56 SNPs/基因組/年</strong>（95% HPD: 0.23–0.79）</li><li>三個主要亞系的 MRCA 估計為 1966 年（95% HPD: 1948–1976）</li></ul>`},
  {cat:"Molecular clock",title:"The molecular clock of Mycobacterium tuberculosis (Menardo 2019)",authors:"Fabrizio Menardo et al.",journal:"",year:"2019",country:"",url:"https://pubmed.ncbi.nlm.nih.gov/31337889/",finding:`<ul><li>採樣時間低於 <strong>15–20 年</strong>，往往不足以有效校準 MTB 的分子時鐘</li><li>提醒短時間跨度研究的 clock rate 估計應謹慎解讀</li></ul>`},

  {cat:"Population-based",title:"TB in Botswana (Aug 2012 – Mar 2016)",authors:"Baker 2023",journal:"",year:"2023",country:"Botswana",finding:`<ul><li>946 株（覆蓋率 65%），<strong>47%</strong> 構成群聚，SNP cutoff: <strong>5</strong></li></ul>`},
  {cat:"Population-based",title:"WGS for TB in Victoria, Australia (2017–2020)",authors:"Dale 2022",journal:"Lancet Reg Health West Pac",year:"2022",country:"Australia",finding:`<ul><li>1276 株，覆蓋率 92%；群聚率 16.8%，TB incidence: 7.1/10 萬</li><li>SNP cutoff: <strong>12</strong></li></ul>`},
  {cat:"Population-based",title:"Rural China 12-year TB genomic study (2009–2020)",authors:"Meng Li et al.",journal:"Emerg Microbes Infect",year:"2022",country:"China",finding:`<ul><li>31.4% 構成群聚；epi 連結確認率 41.8%</li><li>81.4% MDR-TB 案例源自傳播（非新取得抗藥性），SNP cutoff: <strong>12</strong></li></ul>`},
  {cat:"Population-based",title:"TB in Hamburg, Germany (2005–2015, 11-year)",authors:"Diel 2019",journal:"Eur Respir J",year:"2019",country:"Germany",url:"https://pubmed.ncbi.nlm.nih.gov/30705093/",finding:`<ul><li>1171 株，覆蓋率 92.3%；群聚率 31.9%，epi 連結 PPV 38.2%</li><li>TB incidence: 4.8/10 萬，SNP cutoff: <strong>5</strong></li></ul>`},
  {cat:"Population-based",title:"TB in Valencia, Spain (2014–2016)",authors:"Xu 2019",journal:"PLoS Medicine",year:"2019",country:"Spain",url:"https://pubmed.ncbi.nlm.nih.gov/31461448/",finding:`<ul><li>785 株，41%（325/785）構成群聚；TransPhylo 推斷傳播</li><li>SNP cutoff: <strong>15</strong></li></ul>`},
  {cat:"Population-based",title:"TB in Oxfordshire, UK (2007–2012)",authors:"Walker 2014",journal:"Lancet Respir Med",year:"2014",country:"UK",url:"https://pubmed.ncbi.nlm.nih.gov/24841674/",finding:`<ul><li>247 株，覆蓋率 91.8%；群聚率 15.8%，epi 連結確認率 28.2%</li><li>TB incidence: 8.4/10 萬，SNP cutoff: <strong>12</strong></li></ul>`},

  // ─── DR Fitness ───
  {cat:"DR Fitness",title:"Effect of drug resistance on secondary TB cases (San Francisco 1991–1999)",authors:"Burgos M. et al.",journal:"J Infect Dis",year:"2003",country:"USA",url:"https://pubmed.ncbi.nlm.nih.gov/12796756/",finding:`<ul><li>抗藥株二次感染率低於感受性株（整體 SR 0.51, 95%CI 0.37–0.69）</li><li>INH 抗藥：SR 0.29；INH+STR 雙抗藥：SR 0.10；STR 單抗藥：SR 0.88（不顯著）</li><li>無 MDR-TB 的二次案例被記錄</li></ul>`},
  {cat:"DR Fitness",title:"Competitive cost of antibiotic resistance in Mtb (Gagneux 2006)",authors:"Gagneux S et al.",journal:"Science",year:"2006",country:"",url:"https://pubmed.ncbi.nlm.nih.gov/16809538/",finding:`<ul><li>所有 rifampin 抗藥突變株均有顯著適應度成本（競爭適應度 0.58–0.91）</li><li>不同 rpoB 突變位點的適應度成本<strong>差異顯著</strong></li></ul>`},
  {cat:"DR Fitness",title:"Impact of bacterial genetics on INH-resistant Mtb transmission (Gagneux 2006)",authors:"Sebastien Gagneux et al.",journal:"PLoS Pathog",year:"2006",country:"USA",url:"https://pubmed.ncbi.nlm.nih.gov/17121460/",finding:`<ul><li>1991–1999 年舊金山，2104 案例</li><li>KatG S315T 或 inhA 啟動子突變的株傳播力<strong>優於</strong>其他 INH 抗藥突變</li><li>特定突變與 MTB lineage 之間存在關聯性</li></ul>`},
  {cat:"DR Fitness",title:"Relative transmission fitness of MDR-Mtb in Georgia (Loiseau 2023)",authors:"Chloé Loiseau et al.",journal:"Nature Comms",year:"2023",country:"Georgia",finding:`<ul><li>Lineage 4 MDR 株傳播適應度低於感受性株</li><li>大多數 <strong>Lineage 2 MDR 株無此缺陷</strong></li><li>L2 高傳播適應度源於 rpoB S450L、補償性突變與 L2 既有遺傳背景的<strong>上位性交互作用（epistasis）</strong></li></ul>`},
  {cat:"DR Fitness",title:"Compensatory evolution drives rifampicin-resistant Mtb transmission in Cape Town",authors:"Galo A Goig et al.",journal:"The Lancet Microbe",year:"2023",country:"South Africa",finding:`<ul><li>2008–2017 年 54% MDR/RR-TB；補償性演化與 RR-TB 個體間傳播增加獨立相關（aOR 1.55, 95%CI 1.13–2.12）</li><li>體外複製適應度<strong>無法預測</strong>體內傳播適應度</li></ul>`},
  {cat:"DR Fitness",title:"Insights into evolution of drug resistance in Mtb (review, Nguyen 2018)",authors:"Nguyen QH et al.",journal:"Evol Applications",year:"2018",country:"",finding:`<ul><li>rpoB H526D 突變在 L2 與 L4 中生物成本不同；rpoB S531L 在兩 lineage 成本相似</li><li>inhA-15 突變與 L1 強相關；katG S315T 與現代 lineage 強相關</li><li>rpoA/rpoC 補償突變可緩解 rpoB 突變的適應度成本</li><li>補償突變在高 MDR/pre-XDR/XDR 克隆中更常見</li></ul>`},

  // ─── Taiwan ───
  {cat:"Taiwan",title:"Distribution of Beijing family genotypes in Taiwan (2002–2003)",authors:"Jou R, Chiang CY, Huang WL",journal:"J Clin Microbiol",year:"2005",country:"Taiwan (4 regions)",finding:`<ul><li>北京株盛行率：北部 51.6%，東部 46.2%，中部 31.6%，南部 28.0%</li><li>北京株的 INH 抗藥率（33.7%）和 EMB 抗藥率（27.0%）顯著高於非北京株</li></ul>`},
  {cat:"Taiwan",title:"Molecular epidemiology of Mtb in Taipei (2002–2004)",authors:"Dou HY et al.",journal:"BMC Infect Dis",year:"2008",country:"Taipei",finding:`<ul><li>356 株（三軍總醫院）；北京株最多（52.5%），Haarlem 其次（13.5%）</li><li>群聚率：Spoligo 82%，MIRU-VNTR 71%，聯合 67%</li><li>北京株更易 MDR（OR 3.73）；EAI 株感受性最高（OR 3.64）</li></ul>`},
  {cat:"Taiwan",title:"Clonal expansion of Mtb genotypes in southern Taiwan (2006–2008)",authors:"Chang JR et al.",journal:"PLoS One",year:"2012",country:"Kaohsiung",finding:`<ul><li>224 株（高雄榮總）；北京株（43.3%），EAI 株（32.1%）並重</li><li>129 株（<strong>57.6%</strong>）構成 18 個基因型群聚</li><li>30 歲以下感染者 63.6% 為北京株，暗示北京株在年輕族群中有近期傳播</li></ul>`},
  {cat:"Taiwan",title:"Molecular epidemiology of TB in Kaohsiung (2000–2008)",authors:"Chen YY et al.",journal:"PLoS One",year:"2015",country:"Kaohsiung",finding:`<ul><li>421 株；EAI lineage 比例增加（19.7% → 31.9%），北京株穩定（約 42%）</li><li>EAI 株傳播率（<strong>47.5%</strong>）顯著高於北京株（20.0%）</li></ul>`},
  {cat:"Taiwan",title:"Molecular epidemiology of TB in Changhua, Taiwan (2012)",authors:"Chen YY et al.",journal:"Scientific Reports",year:"2017",country:"Changhua",finding:`<ul><li>303 株（彰基 2012）；北京株 37.6%，Haarlem 25.1%，EAI 13.9%</li><li>結合分子分型與空間分析識別高傳播區域</li></ul>`},
  {cat:"Taiwan",title:"Beijing strain mixed infection and drug resistance in Taiwan",authors:"Huang HY et al.",journal:"J Clin Microbiol",year:"2010",country:"Taiwan",finding:`<ul><li>北京株單獨感染 MDR 率最高（17.5%）</li><li>混合感染（Beijing + non-Beijing）對至少一種藥物抗藥率最高（23.8%）</li><li>非北京株對所有藥物感受性率最高（79.5%），北京株是發展抗藥性的<strong>主要因素</strong></li></ul>`},

  // ─── Review ───
  {cat:"Review",title:"Lineage 1 (EAI): a neglected cause of TB (2025 review)",authors:"Venus Marie R Rojas et al.",journal:"PLoS Negl Trop Dis",year:"2025",country:"",finding:`<ul><li>L1 與肺外 TB 及無症狀 TB 可能相關</li><li>傳統認為 L1 傳播力較低的觀點正<strong>受到新數據挑戰</strong>，L1 可能與 L2、L4 一樣具傳播力</li><li>L1 可能以獨特方式演化出藥物抗藥性</li></ul>`},
  {cat:"Review",title:"Hyper-transmission of Beijing lineage: systematic review and meta-analysis (Karmakar 2019)",authors:"Malancha Karmakar et al.",journal:"J Infection",year:"2019",country:"",url:"https://pubmed.ncbi.nlm.nih.gov/30659837/",finding:`<ul><li>46 篇研究，42,700 位患者，27 個國家（至 2018 年）</li><li>72.4% 的研究中北京株為最盛行且群聚率最高</li><li>北京株傳播力高於非北京株（<strong>OR 1.81</strong>，95%CI 1.28–2.57）</li></ul>`},
  {cat:"Review",title:"Role and value of WGS in studying TB transmission (Nikolayevskyy 2019)",authors:"Vlad Nikolayevskyy",journal:"Clin Microbiol Infect",year:"2019",country:"69 publications",url:"https://pubmed.ncbi.nlm.nih.gov/30978481/",finding:`<ul><li>&gt;30 篇研究支持 <strong>&lt;6 SNP</strong> 門檻可有效排除非近期傳播案例</li><li>WGS 識別 epi 連結的靈敏度可達 100%（8 篇研究），特異度依設定差異大（17–95%）</li></ul>`},
  {cat:"Review",title:"WGS alone cannot definitively determine recent TB transmission (Nelson 2022)",authors:"Kristian N. Nelson",journal:"Frontiers",year:"2022",country:"USA",finding:`<ul><li>WGS <strong>單獨無法</strong>明確判定案例是否源自近期傳播</li><li>整合臨床、流行病學與基因組數據，才能提供更可靠的近期傳播評估</li></ul>`},
  {cat:"Review",title:"WGS for interpreting TB transmission: systematic review (Hatherell 2016)",authors:"Hollie-Ann Hatherell et al.",journal:"",year:"2016",country:"",finding:`<ul><li>25 篇研究（至 2015 年 7 月）</li><li>整理 SNP 門檻應用於確認近期傳播、復發 vs. 再感染、微演化 vs. 混合感染的方法比較</li></ul>`},
  {cat:"Review",title:"Whole genome sequencing for Mycobacterium tuberculosis in public health responses: a review of current practice and enablers in select low-incidence jurisdictions",authors:"Justin T Denholm, Gerard de Vries, Richard Anthony, Esther Robinson, Matthijs Backx et al.",journal:"BMC Public Health",year:"2026",country:"Multi-jurisdiction (AU, NL, UK, ...)",url:"https://link.springer.com/article/10.1186/s12889-026-26979-0",added:"2026-05-09",finding:`<ul><li>整合多個<strong>低發生率轄區</strong>（澳洲、荷蘭、英國等）之 WGS 公衛應用實作經驗</li><li>涵蓋<strong>基因體資料解讀、與臨床/流病服務串接、公衛效益評估</strong>等程式化活動之比較</li><li>提供 low-incidence 國家 WGS 導入之 practical enablers 與挑戰整理</li><li>對台灣（中→低發生率過渡期）之 WGS 政策設計具參考價值</li></ul>`},

  // ─── Subclinical TB ───
  {cat:"Subclinical TB",title:"Five-state TB spectrum model (Drain 2018)",authors:"Paul K. Drain et al.",journal:"Clin Microbiol Reviews",year:"2018",country:"",url:"https://pubmed.ncbi.nlm.nih.gov/29720504/",finding:`<ul><li>提出五階段 TB 感染連續體：消除感染 → 潛伏感染 → 初期感染 → 亞臨床 TB → 活動性 TB</li><li>各階段有不同的生物學特徵、臨床表現和介入策略</li></ul>`},
  {cat:"Subclinical TB",title:"Subclinical TB review and prevalence surveys (Frascella 2021)",authors:"Beatrice Frascella et al.",journal:"CID",year:"2021",country:"",finding:`<ul><li>亞臨床 TB 定義：<strong>無症狀</strong>（無篩查症狀）且<strong>細菌學確認</strong>（培養或 PCR 陽性）</li><li>亞臨床 TB 在盛行率調查中相當常見，定義標準化仍是重要議題</li></ul>`},
  {cat:"Subclinical TB",title:"Subclinical TB contributes to Mtb transmission (Vietnam study, Nguyen 2023)",authors:"Hai Viet Nguyen et al.",journal:"CID",year:"2023",country:"Vietnam",finding:`<ul><li>與臨床+塗片陽性 TB 患者同住的 6–10 歲兒童，TST 陽性風險提高（aRR 3.56）</li><li>與亞臨床+塗片陽性 TB 患者同住，TST 陽性風險同樣提高（<strong>aRR 3.11</strong>）</li><li>支持亞臨床 TB 確實有<strong>傳播貢獻</strong>的假說</li></ul>`},
  {cat:"Subclinical TB",title:"Smear-positive subclinical TB generates disproportionate transmission (Ryckman 2022)",authors:"Theresa S. Ryckman et al.",journal:"PNAS",year:"2022",country:"",finding:`<ul><li>塗片陽性亞臨床 TB（佔盛行率 11–19%）產生 <strong>35–51%</strong> 的未來傳播事件</li><li>塗片陰性亞臨床 TB（佔盛行率 42–55%）僅產生 9–16% 的傳播，因傳播期較短</li></ul>`},

  // ─── Prediction of DR ───
  {cat:"Prediction of DR",title:"WGS for drug susceptibility prediction (Walker 2015, multi-country cohort)",authors:"Timothy M Walker et al.",journal:"Lancet Infect Dis",year:"2015",country:"UK, Sierra Leone, S.Africa, Germany, Uzbekistan",url:"https://pubmed.ncbi.nlm.nih.gov/25569550/",finding:`<ul><li>2099 株 Mtb 基因組（2010–2013），代表全球 7 個 clade</li><li>WGS 能有效預測一線藥物抗藥性，為<strong>個人化治療</strong>提供依據</li></ul>`},

  {cat:"Prediction of DR",title:"Evaluation of 5 WGS tools for drug susceptibility testing (2019)",authors:"",journal:"",year:"2019",country:"",finding:`<ul><li>五工具（PhyResSE, Mykrobe, TB Profiler, TGS-TB, KvarQ）靈敏度 74–80%，特異度 &gt;95%</li><li>WGS 週轉時間僅 <strong>5 天</strong>（vs MGIT 19 天）；試劑成本 €143（vs €26）</li></ul>`},
  {cat:"Prediction of DR",title:"Applying WGS to predict DR in Denmark (20-year nationwide, Kurtzhals 2024)",authors:"Mads Lindholm Kurtzhals et al.",journal:"Antimicrob Agents Chemother",year:"2024",country:"Denmark",finding:`<ul><li>6230 株 WGS 樣本，20 年全國數據</li><li>靈敏度：INH 82.5%，<strong>RIF 97.3%</strong>，EMB 58.0%，PZA 60.5%</li><li>特異度：INH/RIF 99.8%，EMB 99.4%，PZA 99.9%；RIF 預測最準確</li></ul>`},

  // ─── NGS Platform ───

let activePage = 'wgs';

function catColor(cat) {
  const map = {
    "Transmission cluster": "b-blue",
    "Molecular clock": "b-amber",
    "Population-based": "b-green",
    "DR Fitness": "b-rose",
    "Taiwan": "b-green",
    "Review": "b-purple",
    "Subclinical TB": "b-green",
    "Prediction of DR": "b-blue",
    "NGS Platform": "b-amber",
    "Long-read Seq": "b-blue",
    "Within-host": "b-purple",
    "MIRU vs WGS": "b-amber",
    "DirectSeq": "b-rose",
    "genomic+spatial": "b-purple"
  };
  return map[cat] || "b-blue";
}

function hostCatColor(cat) {
  const map = {
    "host genetics": "b-green",
    "G2G": "b-purple"
  };
  return map[cat] || "b-blue";
}

function switchPage(page) {
  activePage = page;
  document.getElementById('page-wgs').style.display = page === 'wgs' ? '' : 'none';
  document.getElementById('page-host').style.display = page === 'host' ? '' : 'none';
  document.querySelectorAll('.page-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.page === page);
  });
  if (page === 'wgs') render();
  else renderHost();
}

function searchDispatch() {
  if (activePage === 'wgs') render();
  else renderHost();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const rows = DATA.filter(d => {
    const matchCat = activeCat === "全部" || d.cat === activeCat;
    const matchQ = !q || (d.title + d.authors + d.finding + d.country + d.year + d.journal).toLowerCase().includes(q);
    return matchCat && matchQ;
  }).sort((a, b) => (parseInt(b.year) || 0) - (parseInt(a.year) || 0));

  document.getElementById('s-total').textContent = DATA.length;
  document.getElementById('s-finding').textContent = DATA.filter(d => d.finding && !d.finding.includes('no-finding')).length;
  document.getElementById('s-recent').textContent = DATA.filter(d => parseInt(d.year) >= 2020).length;
  document.getElementById('s-cats').textContent = CATS.length;
  document.getElementById('s-shown').textContent = rows.length;
  document.getElementById('ft-total').textContent = DATA.length + HOST_DATA.length;
  document.getElementById('count-line').textContent = `// 顯示 ${rows.length} / ${DATA.length} 筆`;

  const tbody = document.getElementById('tbody');
  if (rows.length === 0) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="6">找不到符合條件的文獻</td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(d => {
    const titleHtml = d.url
      ? `<a href="${d.url}" target="_blank" rel="noopener noreferrer">${d.title}</a>`
      : d.title;
    const newTag = d.added ? `<span class="new-tag">NEW</span>` : '';
    return `
    <tr>
      <td class="title-cell">${titleHtml}${newTag}<br><span class="year-tag">${d.year || '—'} · ${d.journal || '—'}${d.added ? ' · added ' + d.added : ''}</span></td>
      <td class="author-cell">${d.authors || '—'}</td>
      <td class="journal-cell">${d.journal || '—'}</td>
      <td class="country-cell">${d.country || '—'}</td>
      <td><span class="badge ${catColor(d.cat)}">${d.cat}</span></td>
      <td class="finding-cell">${d.finding || '<span class="no-finding">尚待補充</span>'}</td>
    </tr>
  `;
  }).join('');
}

  const tbody = document.getElementById('htbody');
  if (rows.length === 0) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="8">找不到符合條件的文獻</td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(d => {
    const titleHtml = d.url
      ? `<a href="${d.url}" target="_blank" rel="noopener noreferrer">${d.title}</a>`
      : d.title;
    const newTag = d.added ? `<span class="new-tag">NEW</span>` : '';
    return `
    <tr>
      <td class="title-cell">${titleHtml}${newTag}<br><span class="year-tag">${d.year || '—'} · ${d.journal || '—'}</span></td>
      <td class="author-cell">${d.authors || '—'}</td>
      <td class="journal-cell">${d.journal || '—'}</td>
      <td class="country-cell">${d.country || '—'}</td>
      <td><span class="badge ${hostCatColor(d.cat)}">${d.cat}</span></td>
      <td class="db-cell">${d.database || '—'}</td>
      <td class="gene-cell">${d.gene || '—'}</td>
      <td class="finding-cell">${d.finding || '<span class="no-finding">尚待補充</span>'}</td>
    </tr>
  `;
  }).join('');
}

// Build WGS tabs
const tabDiv = document.getElementById('tabs');
["全部", ...CATS].forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'tab' + (cat === "全部" ? ' active' : '');
  btn.textContent = cat;
  btn.onclick = () => {
    activeCat = cat;
    document.querySelectorAll('#tabs .tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  };
  tabDiv.appendChild(btn);
});

// Build Host-Pathogen tabs
const hostTabDiv = document.getElementById('htabs');
["全部", ...HOST_CATS].forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'tab' + (cat === "全部" ? ' active' : '');
  btn.textContent = cat;
  btn.onclick = () => {
    activeHostCat = cat;
    document.querySelectorAll('#htabs .tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderHost();
  };
  hostTabDiv.appendChild(btn);
});

render();
renderHost();
</script>
</body>
</html>
